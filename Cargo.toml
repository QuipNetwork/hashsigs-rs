[package]
name = "hashsigs-rs"
version = "0.0.3"
edition = "2021"
authors = ["Richard T. Carback III <rick.rust.cargo.383d5@passmail.net>"]
description = "Hash-based signatures core library with WOTS+ and SHRINCS primitives"
license = "AGPL-3.0-or-later"
repository = "https://github.com/quipnetwork/hashsigs-rs"
documentation = "https://docs.rs/hashsigs-rs"
readme = "README.md"
keywords = ["cryptography", "wots", "shrincs", "signature", "solana"]
categories = ["cryptography", "authentication"]

[lib]
name = "hashsigs_rs"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[workspace]
members = [
    "solana"
]
resolver = "2"

[features]
default = []
wasm-bindings = [
    "dep:serde-wasm-bindgen",
    "dep:wasm-bindgen",
    "dep:tsify",
]

[dependencies]
solana-program = "2.3"
serde = { version = "1.0.219", features = ["derive"] }
serde-wasm-bindgen = { version = "0.6.5", optional = true }
# =0.5.5: last tsify accepting wasm-bindgen 0.2.100, which the wasm-bindgen CLI
# pin in bin/build-wasm.sh must match exactly (0.5.6 forces ^0.2.104).
tsify = { version = "=0.5.5", default-features = false, features = ["js"], optional = true }
wasm-bindgen = { version = "0.2.100", optional = true }

[dev-dependencies]
serde_json = "1.0.143"
wasm-bindgen-test = "0.3.50"
