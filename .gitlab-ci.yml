# CI for hashsigs-rs.
#
# - On merge requests and the default branch: build + test the crate (incl. the
#   wasm target) so regressions are caught before merge.
# - On a version tag (e.g. v0.2.0): build the wasm, pack the ts/ package, and
#   publish @quip.network/hashsigs-wasm at the tag's version to npm.
#
# Publishing uses npm OIDC trusted publishing (tokenless): GitLab mints a
# short-lived NPM_ID_TOKEN via `id_tokens`, npm exchanges it for publish
# credentials, and provenance attestations are generated automatically. There
# is no long-lived NPM_TOKEN. A "Trusted Publisher" must be configured on
# npmjs.com for @quip.network/hashsigs-wasm (namespace/project/CI-file path)
# with `npm stage publish` allowed.
#
# RUNNER SPLIT: npm trusted publishing only works on gitlab.com shared runners,
# not self-hosted runners. So the heavy Rust/wasm build runs on the self-hosted
# fleet (tag `x86_64`) and produces a packed tarball artifact; a lightweight
# publish job runs on a shared runner (tag `saas-linux-small-amd64`) and stages
# that prebuilt tarball. Publishing a tarball skips the prepack rebuild, so the
# shared runner needs only Node + npm. Shared runners must be enabled on the
# project (Settings -> CI/CD -> Runners).
#
# npm staging requires the package to already exist, and OIDC trusted publishing
# can only be configured on an existing package. So the very first publish is
# done once by a maintainer locally (`npm publish` with 2FA) to create the
# package; CI never bootstraps it. Thereafter every tagged release is staged via
# CI (`npm stage publish`) and a maintainer approves it with 2FA before it goes
# live.
#
# The wasm-bindgen CLI version MUST equal the crate's wasm-bindgen dependency
# (0.2.100) or wasm-bindgen emits a schema-mismatch error.
# Node major is pinned to 22 (LTS) for the TS packaging jobs. npm is upgraded to
# NPM_VERSION because trusted publishing needs >=11.5.1 and staging >=11.15.0,
# while Node 22.14 ships npm 10.x.

stages: [test, package, publish]

variables:
  WASM_BINDGEN_VERSION: "0.2.100"
  # Node 22 LTS; install from nodejs.org tarball so the major is fixed (not
  # whatever Debian ships under apt `nodejs`).
  NODE_MAJOR: "22"
  NODE_VERSION: "22.14.0"
  # npm >= 11.15.0 is required for `npm stage publish`; pin for reproducibility.
  # Stay on 11.x: npm 12 needs Node >= 22.22, but Node is pinned to the 22.14.0
  # trusted-publishing floor. npm 11.18 engine is node >=22.9, so it's compatible.
  NPM_VERSION: "11.18.0"

# Pin every job to the self-hosted Linux fleet (lovelace/watch/finney all carry
# these tags; SaaS runners do not). This keeps all jobs on project runners even
# after shared runners are enabled on the project. publish-npm overrides this
# with its own `tags` to reach a gitlab.com shared runner, the only place npm
# OIDC trusted publishing works. A job's own `tags` replaces the default (no
# merge), so the override is clean.
default:
  tags: [linux, x86_64]

# Shared before_script fragments via GitLab !reference (not YAML list anchors,
# which nest incorrectly when expanded under another list).
.install-node-pinned:
  before_script:
    - |
      set -euo pipefail
      ARCH="$(uname -m)"
      case "$ARCH" in
        x86_64) NODE_ARCH=x64 ;;
        aarch64|arm64) NODE_ARCH=arm64 ;;
        *) echo "unsupported arch: $ARCH" >&2; exit 1 ;;
      esac
      curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-${NODE_ARCH}.tar.xz" \
        | tar -xJ -C /usr/local --strip-components=1
      node --version
      npm --version
      case "$(node --version)" in
        v${NODE_MAJOR}.*) ;;
        *) echo "expected Node ${NODE_MAJOR}.x, got $(node --version)" >&2; exit 1 ;;
      esac

.install-wasm-bindgen:
  before_script:
    - rustup target add wasm32-unknown-unknown
    - cargo install wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION"

build-test:
  stage: test
  image: rust:1.89.0
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - rustup target add wasm32-unknown-unknown
  script:
    - cargo test --locked --features wasm-bindings
    # Profile features are mutually exclusive; check each path compiles.
    - cargo check --locked --features profile-128s-q18
    - cargo check --locked --features profile-128s-q20
    # Default-profile wasm build (no profile-* feature). ts-conformance rebuilds
    # only when packaging via npm run build → build-wasm.sh.
    - cargo build --locked --release --target wasm32-unknown-unknown --features wasm-bindings

# Static clippy gate. Profile features are mutually exclusive, so lint the same
# feature set CI tests (wasm-bindings), not --all-features. NOTE: `cargo fmt --check`
# is intentionally not wired in yet — the tree is not fully rustfmt-clean; add it in a
# dedicated formatting pass so this gate does not fail on pre-existing style drift.
clippy:
  stage: test
  image: rust:1.89.0
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --all-targets --features wasm-bindings --locked -- -D warnings

# Conformance test against the BUILT package (dist/): loaders, exports map,
# ESM/CJS scoping, base64-inline path — the layer cargo tests never touch.
# npm run build already runs build-wasm.sh + npm test once; do not invoke them
# again here.
ts-conformance:
  stage: test
  image: rust:1.89.0
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - !reference [.install-node-pinned, before_script]
    - !reference [.install-wasm-bindgen, before_script]
  script:
    - cd ts && npm ci
    - npm run build

# Build + pack on the self-hosted fleet (has the Rust/wasm toolchain and the
# muscle for it). Produces the publishable tarball as an artifact; the shared
# runner cannot build wasm and must not try to.
build-package:
  stage: package
  image: rust:1.89.0
  # Inherits default tags [linux, x86_64] -> runs on the self-hosted Linux fleet.
  # Anchored semver, optional pre-release suffix (e.g. v0.2.0-rc1); rejects v1.2.3.4 / v1.2.3-foo trailing junk.
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$/ # runs only on a semver version tag
  before_script:
    - !reference [.install-node-pinned, before_script]
    - !reference [.install-wasm-bindgen, before_script]
  script:
    # Tag pipelines do not run build-test, so gate the release on the Rust suite here.
    - cargo test --locked --features wasm-bindings
    - cd ts && npm ci
    - npm version "${CI_COMMIT_TAG#v}" --no-git-tag-version --allow-same-version # tag v0.2.0 -> 0.2.0
    # `npm pack` runs prepack -> npm run build (wasm + tsc + conformance +
    # sync-version), then writes quip.network-hashsigs-wasm-<version>.tgz.
    - npm pack
  artifacts:
    paths:
      - ts/quip.network-hashsigs-wasm-*.tgz
    expire_in: 7 days

# Stage the prebuilt tarball on a shared runner (npm OIDC only works there).
# Publishing a tarball skips prepack, so no Rust/wasm toolchain is needed.
publish-npm:
  stage: publish
  image: node:${NODE_VERSION}
  tags: [saas-linux-small-amd64] # gitlab.com shared runner; required for npm OIDC
  # OIDC token for tokenless trusted publishing; npm auto-detects NPM_ID_TOKEN.
  # SIGSTORE_ID_TOKEN enables the sigstore-signed provenance attestation.
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$/ # runs only on a semver version tag
  dependencies: [build-package] # pull the tarball artifact
  before_script:
    # Trusted publishing (>=11.5.1) and staging (>=11.15.0) need a newer npm than
    # the node:22.14 image bundles.
    - npm install -g "npm@${NPM_VERSION}"
    - npm --version
  script:
    # Stage the release for maintainer approval (npm stage approve, 2FA). The
    # package must already exist (first publish is a one-time manual local
    # `npm publish`); fail with a clear message rather than a cryptic npm error
    # if it does not. Prereleases (e.g. 0.2.0-rc1) must go to a non-`latest`
    # dist-tag, derived from the prerelease identifier (rc1 -> rc, beta.2 -> beta).
    - |
      set -euo pipefail
      PKG="$(node -p 'require("./ts/package.json").name')"
      # Leading ./ so npm treats this as a file, not a github owner/repo spec.
      TARBALL="./$(ls ts/quip.network-hashsigs-wasm-*.tgz)"
      if ! npm view "$PKG" version >/dev/null 2>&1; then
        echo "ERROR: $PKG is not on npm yet. Do the one-time bootstrap publish" >&2
        echo "locally (npm publish, with 2FA), add the Trusted Publisher, then" >&2
        echo "re-run this tag. CI only stages releases for existing packages." >&2
        exit 1
      fi
      VERSION="${CI_COMMIT_TAG#v}"
      DIST_TAG="latest"
      case "$VERSION" in
        *-*)
          DIST_TAG="$(printf '%s' "${VERSION#*-}" | sed -E 's/[^A-Za-z].*$//')"
          [ -n "$DIST_TAG" ] || DIST_TAG="next"
          ;;
      esac
      echo "staging $TARBALL ($PKG@$VERSION) on dist-tag '$DIST_TAG'"
      npm stage publish "$TARBALL" --access public --tag "$DIST_TAG"
